# IAmDataEng — local lakehouse stack for `storage.partitioned-lakehouse`.
#
# Two services on the loopback interface:
#   - minio        : S3-compatible object store (port 9000 = S3 API, 9001 = console)
#   - iceberg-rest : Apache Iceberg REST catalog backed by an in-memory JDBC store,
#                    writing table metadata + data files into MinIO via the S3 API.
#
# Endpoints the learner code (and the test rubric) target:
#   S3 API           : http://localhost:9000
#   Iceberg catalog  : http://localhost:8181
#   Warehouse path   : s3://warehouse/
#   Credentials      : admin / password  (committed on purpose — local-only stack)
#
# Boot order matters. The iceberg-rest container creates the `warehouse` bucket
# on startup IF AND ONLY IF MinIO is reachable. We rely on the `depends_on` +
# healthcheck combo below. The bucket itself is created by the `mc-init` job.

services:
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: iamdataeng-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 3s

  # One-shot init job: waits for MinIO, creates the `warehouse` bucket, exits.
  # Idempotent — safe to re-run.
  mc-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: iamdataeng-mc-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 admin password &&
      mc mb --ignore-existing local/warehouse &&
      echo 'bucket warehouse ready';
      "

  iceberg-rest:
    image: tabulario/iceberg-rest:1.6.0
    container_name: iamdataeng-iceberg-rest
    depends_on:
      mc-init:
        condition: service_completed_successfully
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: us-east-1
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/v1/config"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s

volumes:
  minio-data:
